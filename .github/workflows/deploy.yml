# Proste i niezawodne wdrożenie aplikacji Vite/React na GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Wyłączamy cache, ponieważ nie wypychasz pliku package-lock.json do repozytorium

      - name: Install dependencies
        # Zmieniamy z 'npm ci' na 'npm install', ponieważ 'npm ci' wymaga obecności pliku package-lock.json
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Folder dist powstaje bezpośrednio w głównym katalogu repozytorium
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
